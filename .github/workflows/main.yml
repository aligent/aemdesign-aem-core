name: build

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          # full history required: git-commit-id-plugin derives the project
          # version from the nearest git tag + commit count
          fetch-depth: 0

      - name: set up java 8
        uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: temurin
          cache: maven
          # writes a 'github' server entry into ~/.m2/settings.xml for deploy
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: get version
        id: version
        run: |
          TAG=$(git describe --tags --abbrev=0)
          COUNT=$(git rev-list ${TAG}..HEAD --count)
          echo "revision=${TAG}.${COUNT}" >> $GITHUB_OUTPUT

      - name: build and test
        run: mvn package -B -Drevision=${{ steps.version.outputs.revision }}

      - name: deploy to github packages
        if: github.ref == 'refs/heads/master'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          mvn deploy -B -DskipTests \
            -Drevision=${{ steps.version.outputs.revision }} \
            -DaltDeploymentRepository=github::default::https://maven.pkg.github.com/${{ github.repository }}
